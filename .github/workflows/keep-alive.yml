name: Keep Backend Alive

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub minimum)
  workflow_dispatch:          # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://munim-gewi.onrender.com/health || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is alive"
          else
            echo "⚠️ Backend returned $STATUS — it may be waking up (self-ping will handle it)"
          fi
          # Never exit 1 — we don't want failed workflow notifications
          exit 0
