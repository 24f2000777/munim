services:
  - type: web
    name: munim-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: USE_CELERY
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"
